<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#0B1120" />
        <title>履歷 PDF · 林家齊 Chia-Chi Lin</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="./style/style.css" />
    </head>

    <body>
        <div class="aurora" aria-hidden="true">
            <span class="aurora__blob aurora__blob--indigo"></span>
            <span class="aurora__blob aurora__blob--cyan"></span>
            <div class="aurora__grid"></div>
        </div>

        <header class="site-nav">
            <div class="site-nav__inner container-xl">
                <a class="site-nav__brand" href="./index.html" aria-label="回首頁">
                    <span class="site-nav__brand-bracket">&lt;</span>
                    <span class="site-nav__brand-name">ChiaChi.dev</span>
                    <span class="site-nav__brand-bracket">/&gt;</span>
                </a>

                <div class="site-nav__actions">
                    <a
                        class="btn-pill btn-pill--ghost"
                        href="./履歷pdf/104林家齊(2026前端履歷0514).pdf"
                        download
                    >
                        下載 PDF
                    </a>
                    <a class="btn-pill btn-pill--solid" href="./index.html">
                        ← 返回首頁
                    </a>
                </div>
            </div>
        </header>

        <main class="section" id="main">
            <div class="container-xl">
                <header class="section__head section__head--center">
                    <span class="section__tag">Resume · 2026/05/14</span>
                    <h1 class="section__title section__title--center">
                        我的<span class="gradient-text">完整履歷</span>
                    </h1>
                    <p class="section__lede" style="margin-left: auto; margin-right: auto;">
                        最後更新：2026 年 5 月 14 日。
                        歡迎下載 PDF 版本或直接於下方瀏覽。
                    </p>
                </header>

                <div class="pdf-frame">
                    <div class="pdf-frame__head">
                        <span class="pdf-frame__dot"></span>
                        <span class="pdf-frame__dot"></span>
                        <span class="pdf-frame__dot"></span>
                        <span class="pdf-frame__name">104林家齊(2026前端履歷0514).pdf</span>
                    </div>
                    <iframe
                        class="pdf-frame__viewer"
                        src="./履歷pdf/104林家齊(2026前端履歷0514).pdf"
                        title="林家齊履歷 PDF"
                    ></iframe>
                </div>

                <p style="text-align: center; margin-top: 2rem; color: var(--text-400); font-size: 0.9rem;">
                    若 PDF 無法顯示，請
                    <a
                        href="./履歷pdf/104林家齊(2026前端履歷0514).pdf"
                        download
                        style="color: var(--accent-2);"
                    >
                        點此直接下載
                    </a>
                </p>
            </div>
        </main>

        <footer class="site-footer">
            <div class="container-xl">
                <p>© <span id="footer-year"></span> 林家齊 Chia-Chi Lin.</p>
            </div>
        </footer>

        <style>
            .pdf-frame {
                max-width: 64rem;
                margin: 0 auto;
                background: var(--bg-card-solid);
                border: 1px solid var(--border-strong);
                border-radius: var(--radius-lg);
                overflow: hidden;
                box-shadow: var(--shadow-lg);
            }

            .pdf-frame__head {
                display: flex;
                align-items: center;
                gap: 0.4rem;
                padding: 0.75rem 1rem;
                background: rgba(0, 0, 0, 0.3);
                border-bottom: 1px solid var(--border);
            }

            .pdf-frame__dot {
                width: 0.7rem;
                height: 0.7rem;
                border-radius: 50%;
            }
            .pdf-frame__dot:nth-child(1) { background: #ff5f56; }
            .pdf-frame__dot:nth-child(2) { background: #ffbd2e; }
            .pdf-frame__dot:nth-child(3) { background: #27c93f; }

            .pdf-frame__name {
                margin-left: 0.75rem;
                font-family: var(--ff-mono);
                font-size: 0.85rem;
                color: var(--text-400);
            }

            .pdf-frame__viewer {
                width: 100%;
                height: 85vh;
                min-height: 600px;
                border: none;
                background: #fff;
            }
        </style>

        <script>
            document.getElementById("footer-year").textContent = new Date().getFullYear();
        </script>
    </body>
</html>
